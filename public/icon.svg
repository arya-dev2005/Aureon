<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12121A" />
      <stop offset="100%" stop-color="#0A0A0F" />
    </radialGradient>
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A96E" />
      <stop offset="50%" stop-color="#F0D99A" />
      <stop offset="100%" stop-color="#A07840" />
    </linearGradient>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Solid dark base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Elegant Concentric Dashed Ring (similar to O in Aureon logo) -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-dasharray="10 12" opacity="0.65" />
  
  <!-- Outer Bezel Ring -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="url(#goldGrad)" stroke-width="4" filter="url(#goldGlow)" />

  <!-- Intersecting Golden Stylized "A" (from Aureon logo wordmark) -->
  <g transform="translate(256, 252) scale(8)">
    <text x="0" y="8" font-family="'Space Grotesk', sans-serif" font-weight="900" font-size="2.2rem" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">A</text>
    <!-- Thin diagonal gold slash intersecting the 'A' -->
    <line x1="-16" y1="6" x2="16" y2="-6" stroke="url(#goldGrad)" stroke-width="1.8" filter="url(#goldGlow)" />
  </g>

  <!-- Accent star at the top -->
  <path d="M 256,90 L 259,98 L 267,98 L 260,103 L 263,111 L 256,106 L 249,111 L 252,103 L 245,98 L 253,98 Z" fill="url(#goldGrad)" />
</svg>
